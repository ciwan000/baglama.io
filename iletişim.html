<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Barış Aydın</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .contact-card {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid var(--gold);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
        }
        .contact-card h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-bottom: 30px;
            letter-spacing: 3px;
        }
        .contact-item {
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .contact-item label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 8px;
            opacity: 0.8;
        }
        .contact-item a, .contact-item p {
            font-size: 1.2rem;
            color: #fff;
            text-decoration: none;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .contact-item i {
            color: var(--gold);
            font-size: 1.4rem;
        }
        .instagram-link {
            border: 1px solid var(--gold);
            padding: 10px 20px;
            border-radius: 50px;
            transition: 0.4s;
        }
        .instagram-link:hover {
            background: var(--gold);
            color: black !important;
        }
        .instagram-link:hover i {
            color: black;
        }
        .back-home {
            margin-top: 30px;
            display: inline-block;
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .back-home:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="bg-master"></div>

    <div class="contact-container">
        <div class="contact-card">
            <h1>Bağlantı Kur</h1>
            
            <div class="contact-item">
                <label>Telefon & WhatsApp</label>
                <a href="tel:+905000000000">
                    <i class="fa-solid fa-phone"></i> +90 (538) 749 44 68
                </a>
            </div>

            <div class="contact-item">
                <label>Sosyal Medya</label>
                <a href="https://www.instagram.com/barisaydinmusic" target="_blank" class="instagram-link">
                    <i class="fa-brands fa-instagram"></i> @barisaydinmusic
                </a>
            </div>

            <div class="contact-item">
                <label>E-Posta</label>
                <a href="mailto:info@barisaydin.com">
                    <i class="fa-solid fa-envelope"></i> abaris2133@gmail.com
                </a>
            </div>

            <a href="index.html" class="back-home">← Ana Sayfaya Dön</a>
        </div>
    </div>

</body>
</html>
