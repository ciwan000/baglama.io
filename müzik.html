<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performanslar | Barış Aydın</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="müzik-style.css">
</head>
<body>

    <div class="bg-fixed">
        <div class="nebula"></div>
        <div id="dust-box"></div>
    </div>

    <section class="header">
        <h1>PERFORMANS</h1>
        <p class="subtitle">@barisaydinmusic</p>
    </section>

    <div class="video-box">
        <div class="reels-content">
            <div class="instagram-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Logo_of_YouTube_%282015-2017%29.svg" style="display:none;"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="insta-svg"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
            </div>
            <h2>Tüm Performansları İzle</h2>
            <p>En güncel bağlama icraları ve video içerikleri için Reels sayfamı ziyaret edin.</p>
            <a href="https://www.instagram.com/barisaydinmusic/reels/" target="_blank" class="reels-btn">REELS'A GİT</a>
        </div>
    </div>

    <a href="index.html" class="back-btn">← ANA SAYFAYA DÖN</a>

    <div class="promo-img-small">
        <img src="PHOTO-2026-04-12-21-41-45.jpg" alt="Barış Aydın"> 
    </div>

    <script>
        const box = document.getElementById('dust-box');
        for(let i=0; i<40; i++) {
            const d = document.createElement('div'); 
            d.className = 'dust';
            const size = Math.random() * 3 + 'px'; 
            d.style.width = size; d.style.height = size;
            d.style.left = Math.random() * 100 + 'vw'; 
            d.style.animationDuration = (Math.random() * 5 + 5) + 's';
            d.style.animationDelay = (Math.random() * 10) + 's'; 
            box.appendChild(d);
        }
    </script>
</body>
</html>
